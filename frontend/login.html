<!DOCTYPE html>
<html>
<head>
    <title>Secure Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        background-color: lightsteelblue;
    }
</style>
<body>
    <!-- Main Dashboard Heading Container -->
    <h1>📚 Classroom Session Monitoring System</h1>
    
    <!-- Clean Live Digital Timestamp Block -->
    <p id="loginTime" style="font-family:'Times New Roman', Times, serif; font-weight: bold; font-size:20px; margin-bottom: 20px;"></p><hr>

    <!-- Professional Floating Login Box Container Card -->
    <div class="login-card">
        <h2 style="color: #1e3d59; margin-bottom: 25px; text-decoration: none; font-size: 1.5rem; text-align: center;">Secure Admin Login</h2>
        
        <form action="/login" method="POST">
            <label style="font-weight: 600; color: #4a5568; display: block; margin-bottom: 5px;">Username</label>
            <input type="text" placeholder="Enter Administrator Username" name="username" required>
            
            <label style="font-weight: 600; color: #4a5568; display: block; margin-bottom: 5px; margin-top: 10px;">Password</label>
            <input type="password" placeholder="Enter Secure Password" name="password" required>
            
            <button type="submit" style="width: 100%; margin-top: 20px;">Unlock System Dashboard</button>
        </form>
    </div><hr>

    <section id="footer" class="footer">
<footer>
    <p>© 2026 Classroom Session Monitoring System|Developed by Nethra devi S</p>


</footer>
</section>

    <!-- Interactive Live Clock Engine Script -->
    <script>
        function updateClock() {
            document.getElementById("loginTime").innerHTML = new Date().toLocaleString();
        }
        updateClock();
        setInterval(updateClock, 1000); // Dynamic: Tick-updates your clock text every single second!
    </script>
</body>
</html>
